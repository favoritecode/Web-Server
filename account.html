<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FavoriteWeb Account</title>
<link rel="stylesheet" href="/shared.css">
<style>
.account-main {
  width: min(1080px, calc(100% - 32px));
  margin: 52px auto 80px;
}
.account-hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 28px;
  border: 1px solid rgba(148, 163, 184, 0.16);
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(15, 23, 42, 0.78), rgba(17, 24, 39, 0.52));
  box-shadow: 0 22px 60px rgba(0,0,0,0.28);
  backdrop-filter: blur(18px);
}
.account-title h1 {
  font-size: 34px;
  margin-bottom: 8px;
  color: #f8fbff;
}
.account-title p {
  color: #9aa7bd;
  line-height: 1.6;
}
.account-avatar {
  width: 86px;
  height: 86px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, #a855f7, #38bdf8);
  flex: 0 0 auto;
}
.account-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  background: #0b1020;
}
.account-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 22px;
  margin-top: 24px;
}
.account-panel {
  border: 1px solid rgba(148, 163, 184, 0.16);
  border-radius: 16px;
  background: rgba(13, 18, 34, 0.68);
  padding: 24px;
  backdrop-filter: blur(16px);
}
.account-panel h2 {
  font-size: 20px;
  margin-bottom: 16px;
  color: #f8fbff;
}
.info-list {
  display: grid;
  gap: 12px;
}
.info-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(148, 163, 184, 0.1);
}
.info-row span:first-child {
  color: #8ea1bd;
  font-size: 13px;
}
.info-row span:last-child {
  color: #edf2ff;
  overflow-wrap: anywhere;
}
.action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 18px;
}
.account-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 18px;
  border: 1px solid rgba(148, 163, 184, 0.16);
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  color: #e5edff;
  text-decoration: none;
  font-weight: 700;
  cursor: pointer;
}
.account-btn.primary {
  border-color: transparent;
  background: linear-gradient(135deg, #9333ea, #0ea5e9);
  box-shadow: 0 14px 34px rgba(99,102,241,0.28);
}
.settings-form {
  display: grid;
  gap: 14px;
}
.settings-form label {
  display: grid;
  gap: 7px;
  color: #9aa7bd;
  font-size: 13px;
}
.settings-form input,
.settings-form select {
  width: 100%;
  min-height: 42px;
  border: 1px solid rgba(148, 163, 184, 0.16);
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  color: #edf2ff;
  padding: 0 12px;
  outline: none;
}
.settings-form select option {
  background: #111827;
}
.save-note {
  min-height: 20px;
  color: #5eead4;
  font-size: 13px;
}
@media (max-width: 760px) {
  .account-main { margin-top: 28px; }
  .account-hero { align-items: flex-start; padding: 22px; }
  .account-title h1 { font-size: 27px; }
  .account-avatar { width: 68px; height: 68px; }
  .account-grid { grid-template-columns: 1fr; }
  .info-row { grid-template-columns: 1fr; gap: 5px; }
}
</style>
</head>
<body>
<div class="main-content">
  <main class="account-main">
    <section class="account-hero">
      <div class="account-title">
        <h1 id="pageTitle">Account</h1>
        <p id="pageSubtitle">Manage your FavoriteWeb account and dashboard preferences.</p>
      </div>
      <div class="account-avatar"><img id="profileImage" src="/assets/favorite-web-logo.png" alt=""></div>
    </section>

    <section class="account-grid">
      <div class="account-panel" id="profilePanel">
        <h2>Profile Details</h2>
        <div class="info-list">
          <div class="info-row"><span>Name</span><span id="profileName">Loading...</span></div>
          <div class="info-row"><span>Email</span><span id="profileEmail">Loading...</span></div>
          <div class="info-row"><span>Status</span><span>Signed in with Google</span></div>
        </div>
        <div class="action-row">
          <a class="account-btn primary" href="/dashboard">Open Dashboard</a>
          <a class="account-btn" href="/logout">Logout</a>
        </div>
      </div>

      <div class="account-panel" id="settingsPanel">
        <h2>Settings</h2>
        <form class="settings-form" id="settingsForm">
          <label>Dashboard Label
            <input id="displayLabel" type="text" placeholder="FavoriteWeb Dashboard">
          </label>
          <label>Default Tool
            <select id="defaultTool">
              <option value="/upload">Cloud Drive</option>
              <option value="/download">Download</option>
              <option value="/ytplayer/">YT Stream</option>
              <option value="/ocr">OCR</option>
              <option value="/analytics">Web Analyzer</option>
            </select>
          </label>
          <button class="account-btn primary" type="submit">Save Settings</button>
          <p class="save-note" id="saveNote"></p>
        </form>
      </div>
    </section>
  </main>
</div>
<script>
(function() {
  var path = window.location.pathname;
  var isSettings = path.indexOf("settings") >= 0;
  var title = document.getElementById("pageTitle");
  var subtitle = document.getElementById("pageSubtitle");
  if (isSettings) {
    title.textContent = "Settings";
    subtitle.textContent = "Set your default FavoriteWeb dashboard preferences.";
    document.getElementById("settingsPanel").scrollIntoView({ block: "nearest" });
  } else {
    title.textContent = "Profile";
    subtitle.textContent = "Your signed-in FavoriteWeb profile and quick account actions.";
  }

  fetch("/api/user", { cache: "no-store" })
    .then(function(r) { return r.json(); })
    .then(function(user) {
      if (!user.logged_in) { window.location.href = "/login"; return; }
      document.getElementById("profileName").textContent = user.name || "FavoriteWeb User";
      document.getElementById("profileEmail").textContent = user.email || "No email available";
      if (user.picture) document.getElementById("profileImage").src = user.picture;
    })
    .catch(function() { window.location.href = "/login"; });

  var saved = JSON.parse(localStorage.getItem("favoritewebSettings") || "{}");
  document.getElementById("displayLabel").value = saved.displayLabel || "FavoriteWeb Dashboard";
  document.getElementById("defaultTool").value = saved.defaultTool || "/upload";
  document.getElementById("settingsForm").addEventListener("submit", function(event) {
    event.preventDefault();
    var data = {
      displayLabel: document.getElementById("displayLabel").value.trim() || "FavoriteWeb Dashboard",
      defaultTool: document.getElementById("defaultTool").value
    };
    localStorage.setItem("favoritewebSettings", JSON.stringify(data));
    document.getElementById("saveNote").textContent = "Settings saved on this browser.";
  });
})();
</script>
<script src="/shared.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Drive - FavoriteWeb</title>
<link rel="stylesheet" href="/shared.css">
<style>
.upload-hero {
  text-align: center;
  padding: 40px 20px 20px;
}

.upload-hero h1 {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, #60a5fa, #818cf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.upload-hero p {
  color: #6b7280;
  font-size: 15px;
}

/* Upload Panel */
.upload-panel {
  max-width: 960px;
  margin: 20px auto;
  padding: 0 20px;
}

.upload-zone {
  background: rgba(255,255,255,0.04);
  border: 2px dashed rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 50px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.upload-zone:hover, .upload-zone.drag-over {
  border-color: #818cf8;
  background: rgba(129,140,248,0.06);
}

.upload-zone .upload-icon {
  font-size: 48px;
  margin-bottom: 16px;
}

.upload-zone h3 {
  font-size: 18px;
  font-weight: 600;
  color: #f0f0f0;
  margin-bottom: 8px;
}

.upload-zone p {
  color: #6b7280;
  font-size: 14px;
  margin-bottom: 20px;
}

.upload-zone .browse-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  background: linear-gradient(135deg, #7c3aed, #6366f1);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.upload-zone .browse-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(124,58,237,0.3);
}

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin: 20px 0;
  padding: 14px 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  font-size: 14px;
}

.toolbar .left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.toolbar .path-display {
  color: #9ca3af;
  font-size: 13px;
}

.toolbar .path-display span {
  color: #c084fc;
  font-weight: 500;
}

.toolbar button {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}

.toolbar .btn-upload {
  background: linear-gradient(135deg, #7c3aed, #6366f1);
  color: #fff;
}

.toolbar .btn-upload:hover {
  background: linear-gradient(135deg, #8b5cf6, #818cf8);
}

/* File Grid */
.file-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

.file-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  text-decoration: none;
  color: inherit;
}

.file-card:hover {
  border-color: rgba(129,140,248,0.3);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.file-card .file-icon {
  font-size: 36px;
  margin-bottom: 10px;
  display: block;
}

.file-card .file-name {
  font-size: 13px;
  color: #e0e0e0;
  word-break: break-word;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.file-card .file-type-badge {
  display: inline-block;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 8px;
  font-weight: 500;
  text-transform: uppercase;
}

.file-card .file-type-badge.folder {
  background: rgba(124,58,237,0.12);
  color: #c084fc;
}

.file-card .file-type-badge.file {
  background: rgba(59,130,246,0.12);
  color: #60a5fa;
}

.file-card { position: relative; overflow: visible; }
.file-grid, #fileGrid { overflow: visible; }
.file-card.menu-open { z-index: 10000; }
.file-card.menu-open .file-menu { z-index: 10001; }
.file-menu-button {
  position: absolute;
  top: 9px;
  right: 9px;
  width: 30px;
  height: 30px;
  border: 1px solid rgba(148,163,184,.18);
  border-radius: 999px;
  background: rgba(15,23,42,.78);
  color: #dbeafe;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  z-index: 3;
}
.file-menu {
  position: absolute;
  top: 43px;
  right: 9px;
  min-width: 118px;
  padding: 7px;
  border: 1px solid rgba(148,163,184,.16);
  border-radius: 12px;
  background: rgba(15,23,42,.97);
  box-shadow: 0 16px 46px rgba(0,0,0,.36);
  display: none;
  z-index: 4;
}
.file-menu.open { display: grid; gap: 5px; }
.file-menu button {
  border: 0;
  border-radius: 8px;
  background: transparent;
  color: #dbeafe;
  cursor: pointer;
  font-size: 12px;
  font-weight: 750;
  padding: 8px 10px;
  text-align: left;
}
.file-menu button:hover { background: rgba(59,130,246,.14); }
.file-menu button.danger { color: #fecdd3; }
.file-menu button.danger:hover { background: rgba(244,63,94,.12); }
/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #6b7280;
}

.empty-state .empty-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-state h3 {
  font-size: 18px;
  color: #9ca3af;
  margin-bottom: 8px;
}

/* Upload progress */
.upload-progress {
  margin-top: 16px;
}

.upload-progress .progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 99px;
  overflow: hidden;
}

.upload-progress .progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #7c3aed, #818cf8);
  border-radius: 99px;
  transition: width 0.3s;
}

.upload-progress .progress-text {
  font-size: 12px;
  color: #6b7280;
  margin-top: 6px;
  text-align: center;
}

/* Responsive */
@media (max-width: 768px) {
  .upload-hero h1 { font-size: 24px; }
  .file-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .toolbar { flex-direction: column; align-items: stretch; text-align: center; }
  .toolbar .left { justify-content: center; }
}

/* premium drive polish */
.upload-panel { max-width: 1120px; }
.upload-hero {
  width: min(1120px, calc(100% - 28px));
  margin: 28px auto 0;
  padding: 34px 22px 24px;
  border: 1px solid rgba(148,163,184,.14);
  border-radius: 22px;
  background: linear-gradient(145deg, rgba(15,23,42,.72), rgba(17,24,39,.38));
  box-shadow: 0 24px 70px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.05);
}
.toolbar {
  border: 1px solid rgba(148,163,184,.13);
  background: rgba(15,23,42,.52);
  backdrop-filter: blur(14px);
}
.file-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
.file-card {
  min-height: 138px;
  border-radius: 14px;
  background: linear-gradient(160deg, rgba(255,255,255,.065), rgba(255,255,255,.032));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.045);
}
.file-card:hover { border-color: rgba(56,189,248,.34); }
.file-menu { min-width: 142px; }
@media (max-width: 560px) {
  .upload-hero { width: min(100% - 24px, 1120px); border-radius: 18px; }
  .upload-panel { padding: 0 12px; }
  .file-grid { grid-template-columns: repeat(auto-fill, minmax(136px, 1fr)); gap: 12px; }
  .file-card { padding: 18px 12px; }
}
</style>
</head>
<body>

<div class="main-content">
  <div class="upload-hero">
    <h1>&#9729;&#65039; Cloud Drive</h1>
    <p>Browse files uploaded by all users. Upload new files from your dashboard.</p>
  </div>

  <div class="upload-panel">

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="left">
        <button id="backBtn" style="display:none;background:rgba(255,255,255,0.06);color:#9ca3af" onclick="goBack()">&#11013; Back</button>
        <span class="path-display">&#128205; <span id="currentPath">/</span></span>
      </div>
    </div>

    <!-- File Grid -->
    <div id="fileGrid" class="file-grid">
      <div class="empty-state">
        <div class="empty-icon">&#128194;</div>
        <h3>No files yet</h3>
        <p>Open your dashboard to upload files</p>
      </div>
    </div>
  </div>
</div>

<script>
// ============ FILE SYSTEM ============
let currentPath = "";
let currentUserRole = "user";

const fileGrid = document.getElementById("fileGrid");
const currentPathEl = document.getElementById("currentPath");
const backBtn = document.getElementById("backBtn");
// ------ Load Files ------
async function loadFiles(path) {
  try {
    const res = await fetch("/api/drive/files?path=" + encodeURIComponent(path));
    if (!res.ok) throw new Error("Failed");
    const data = await res.json();

    currentPath = data.current || "";
    currentPathEl.textContent = currentPath || "/";
    const nextUrl = currentPath ? "/drive?path=" + encodeURIComponent(currentPath) : "/drive";
    history.replaceState(null, "", nextUrl);
    backBtn.style.display = currentPath ? "inline-flex" : "none";

    if (!data.items || data.items.length === 0) {
      fileGrid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">&#128194;</div>
          <h3>This folder is empty</h3>
          <p>This folder is empty</p>
        </div>`;
      return;
    }

    let html = "";

    // Back button card (as first card)
    if (currentPath) {
      const parent = currentPath.split("/").slice(0, -1).join("/");
      html += `
        <div class="file-card" data-folder="${escapeHtml(parent)}">
          <span class="file-icon">&#128194;</span>
          <div class="file-name">.. (Parent)</div>
          <span class="file-type-badge folder">Back</span>
        </div>`;
    }

    const menuMarkup = (item) => {
      const download = item.can_download ? `<button type="button" data-download-drive="${escapeHtml(item.path)}">Download</button>` : "";
      const share = item.can_share ? `<button type="button" data-share-drive="${escapeHtml(item.path)}" data-share-type="${escapeHtml(item.type)}">Share</button>` : "";
      const move = item.can_move ? `<button type="button" data-move-drive="${escapeHtml(item.path)}">Move</button>` : "";
      const rename = item.can_rename ? `<button type="button" data-rename-drive="${escapeHtml(item.path)}" data-current-name="${escapeHtml(item.name)}">Rename</button>` : "";
      const remove = item.can_delete ? `<button type="button" class="danger" data-delete-drive="${escapeHtml(item.path)}">Delete</button>` : "";
      if (!download && !share && !move && !rename && !remove) return "";
      return `<button class="file-menu-button" type="button" data-menu-button aria-label="File options">&#8942;</button><div class="file-menu">${download}${share}${move}${rename}${remove}</div>`;
    };

    data.items.forEach(item => {
      if (item.type === "folder") {
        html += `
          <div class="file-card" data-folder="${escapeHtml(item.path)}">
            ${menuMarkup(item)}
            <span class="file-icon">&#128193;</span>
            <div class="file-name">${escapeHtml(item.name)}</div>
            <span class="file-type-badge folder">Folder</span>
          </div>`;
      } else {
        const ext = item.name.split(".").pop().toLowerCase();
        const icon = getFileIcon(ext);
        html += `
          <div class="file-card" data-open="/drive/open/${encodePath(item.path)}">
            ${menuMarkup(item)}
            <span class="file-icon">${icon}</span>
            <div class="file-name">${escapeHtml(item.name)}</div>
            <span class="file-type-badge file">${ext.toUpperCase()}</span>
          </div>`;
      }
    });

    fileGrid.innerHTML = html;
  } catch (err) {
    fileGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;color:#f87171">Failed to load files</div>`;
  }
}

function goBack() {
  const parent = currentPath.split("/").slice(0, -1).join("/");
  loadFiles(parent);
}

function getFileIcon(ext) {
  const map = {
    mp4: "&#127909;", mkv: "&#127909;", avi: "&#127909;", mov: "&#127909;", webm: "&#127909;",
    mp3: "&#127925;", wav: "&#127925;", flac: "&#127925;", m4a: "&#127925;", ogg: "&#127925;",
    jpg: "&#128444;", jpeg: "&#128444;", png: "&#128444;", gif: "&#128444;", svg: "&#128444;", webp: "&#128444;",
    pdf: "&#128196;", doc: "&#128221;", docx: "&#128221;", xls: "&#128202;", xlsx: "&#128202;",
    zip: "&#128451;", rar: "&#128451;", "7z": "&#128451;", tar: "&#128451;", gz: "&#128451;",
    txt: "&#128195;",
    html: "&#127760;", css: "&#127912;", js: "&#9889;", json: "&#128203;", py: "&#128013;",
  };
  return map[ext] || "&#128196;";
}

function encodePath(path) {
  return encodeURIComponent(path || '').replace(/%2F/g, '/');
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replace(/&/g, "&" + "amp;")
    .replace(/</g, "&" + "lt;")
    .replace(/>/g, "&" + "gt;")
    .replace(/"/g, "&" + "quot;");
}

fileGrid.addEventListener('click', async (event) => {
  const menuButton = event.target.closest('[data-menu-button]');
  if (menuButton) {
    event.preventDefault();
    event.stopPropagation();
    const menu = menuButton.parentElement.querySelector('.file-menu');
    document.querySelectorAll('.file-menu.open').forEach((openMenu) => {
      if (openMenu !== menu) {
        openMenu.classList.remove('open');
        const card = openMenu.closest('.file-card');
        if (card) card.classList.remove('menu-open');
      }
    });
    const isOpen = menu.classList.toggle('open');
    menuButton.parentElement.classList.toggle('menu-open', isOpen);
    return;
  }

  const downloadButton = event.target.closest('[data-download-drive]');
  if (downloadButton) {
    event.preventDefault();
    event.stopPropagation();
    window.open('/drive/download/' + encodePath(downloadButton.getAttribute('data-download-drive')), '_blank');
    return;
  }

  const shareButton = event.target.closest('[data-share-drive]');
  if (shareButton) {
    event.preventDefault();
    event.stopPropagation();
    const itemPath = shareButton.getAttribute('data-share-drive') || '';
    try {
      const res = await fetch('/api/drive/share-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: itemPath, scope: 'drive' })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.url) {
        alert(data.error || 'Share failed');
        return;
      }
      if (navigator.share) {
        await navigator.share({ title: 'FavoriteWeb Cloud Drive', url: data.url });
      } else if (navigator.clipboard) {
        await navigator.clipboard.writeText(data.url);
        alert('Share link copied.');
      } else {
        prompt('Share link', data.url);
      }
    } catch (e) {
      alert('Share failed');
    }
    return;
  }

  const renameButton = event.target.closest('[data-rename-drive]');
  if (renameButton) {
    event.preventDefault();
    event.stopPropagation();
    const nextName = prompt('New name', renameButton.getAttribute('data-current-name') || '');
    if (!nextName) return;
    const res = await fetch('/api/drive/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: renameButton.getAttribute('data-rename-drive'), newName: nextName })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      alert(data.error || 'Rename failed');
    }
    loadFiles(currentPath);
    return;
  }

  const moveButton = event.target.closest('[data-move-drive]');
  if (moveButton) {
    event.preventDefault();
    event.stopPropagation();
    const itemPath = moveButton.getAttribute('data-move-drive') || '';
    const defaultDestination = itemPath.split('/').slice(0, -1).join('/') || currentPath || '';
    const destination = prompt('Move to folder path', defaultDestination);
    if (destination === null) return;
    const res = await fetch('/api/drive/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: moveButton.getAttribute('data-move-drive'), destination })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      alert(data.error || 'Move failed');
    }
    loadFiles(currentPath);
    return;
  }
  const deleteButton = event.target.closest('[data-delete-drive]');
  if (deleteButton) {
    event.preventDefault();
    event.stopPropagation();
    if (!confirm('Delete this file or folder?')) return;
    const res = await fetch('/api/drive/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: deleteButton.getAttribute('data-delete-drive') })
    });
    if (!res.ok) alert('Delete failed');
    loadFiles(currentPath);
    return;
  }

  const folderCard = event.target.closest('[data-folder]');
  if (folderCard) {
    loadFiles(folderCard.getAttribute('data-folder') || '');
    return;
  }

  const openCard = event.target.closest('[data-open]');
  if (openCard) window.open(openCard.getAttribute('data-open'), '_blank');
});

document.addEventListener('click', (event) => {
  if (!event.target.closest('.file-card')) {
    document.querySelectorAll('.file-menu.open').forEach((menu) => {
      menu.classList.remove('open');
      const card = menu.closest('.file-card');
      if (card) card.classList.remove('menu-open');
    });
  }
});

async function initDrive() {
  try {
    const res = await fetch('/api/user', { cache: 'no-store' });
    if (res.ok) {
      const user = await res.json();
      currentUserRole = user.role || 'user';
    }
  } catch (e) {}
  const params = new URLSearchParams(location.search);
  loadFiles(params.get('path') || "");
}

// Initial load - empty string = root directory
initDrive();
</script>

<script src="/shared.js"></script>
</body>
</html>

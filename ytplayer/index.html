<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Stream Generator - FavoriteWeb</title>
<link rel="stylesheet" href="/shared.css">
<style>
.stream-hero {
  text-align: center;
  padding: 40px 20px 20px;
}

.stream-hero h1 {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, #22c55e, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.stream-hero p {
  color: #6b7280;
  font-size: 15px;
}

.stream-panel {
  max-width: 780px;
  margin: 20px auto;
  padding: 0 20px;
}

/* Input Card */
.stream-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
}

.stream-card .card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.stream-card .card-header .card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.stream-card .card-header .card-icon.green {
  background: rgba(34,197,94,0.15);
}

.stream-card .card-header h3 {
  font-size: 16px;
  font-weight: 600;
  color: #f0f0f0;
}

.stream-card .card-header .card-badge {
  margin-left: auto;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(34,197,94,0.1);
  color: #34d399;
  font-weight: 500;
}

.stream-card textarea {
  width: 100%;
  padding: 14px 16px;
  font-size: 14px;
  font-family: inherit;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  background: rgba(0,0,0,0.25);
  color: #e0e0e0;
  resize: vertical;
  outline: none;
  transition: border 0.2s;
}

.stream-card textarea:focus {
  border-color: #22c55e;
}

.stream-card textarea::placeholder {
  color: #4b5563;
}

.stream-card .action-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.stream-card .action-row button {
  padding: 12px 28px;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.stream-card .action-row button:active {
  transform: scale(0.97);
}

.stream-card .action-row button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.stream-card .action-row .btn-generate {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff;
  flex: 1;
}

.stream-card .action-row .btn-generate:hover:not(:disabled) {
  box-shadow: 0 6px 20px rgba(34,197,94,0.3);
}

.stream-card .action-row .btn-clear {
  background: rgba(255,255,255,0.06);
  color: #9ca3af;
  border: 1px solid rgba(255,255,255,0.1);
}

.stream-card .action-row .btn-clear:hover:not(:disabled) {
  background: rgba(255,255,255,0.1);
}

/* Results Grid */
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 8px;
}

.results-grid .result-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.25s;
}

.results-grid .result-card:hover {
  border-color: rgba(34,197,94,0.2);
}

.results-grid .result-card .card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.results-grid .result-card .card-top .type-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.results-grid .result-card .card-top .type-icon.video {
  background: rgba(59,130,246,0.15);
}

.results-grid .result-card .card-top .type-icon.audio {
  background: rgba(244,114,182,0.15);
}

.results-grid .result-card .card-top h4 {
  font-size: 14px;
  font-weight: 600;
  color: #f0f0f0;
}

.results-grid .result-card .card-top .count {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  color: #6b7280;
}

.results-grid .result-card .card-body {
  padding: 12px 16px;
}

.results-grid .result-card .card-body textarea {
  width: 100%;
  min-height: 120px;
  padding: 10px 12px;
  font-size: 12px;
  font-family: 'Consolas', 'Courier New', monospace;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
  color: #9ca3af;
  resize: vertical;
  outline: none;
  line-height: 1.6;
  word-break: break-all;
}

.results-grid .result-card .card-body textarea:focus {
  border-color: rgba(255,255,255,0.15);
}

.results-grid .result-card .card-footer {
  padding: 10px 16px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  gap: 8px;
}

.results-grid .result-card .card-footer button {
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 500;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.results-grid .result-card .card-footer .btn-copy-video {
  background: rgba(59,130,246,0.15);
  color: #60a5fa;
}

.results-grid .result-card .card-footer .btn-copy-video:hover {
  background: rgba(59,130,246,0.25);
}

.results-grid .result-card .card-footer .btn-copy-audio {
  background: rgba(244,114,182,0.15);
  color: #f472b6;
}

.results-grid .result-card .card-footer .btn-copy-audio:hover {
  background: rgba(244,114,182,0.25);
}

.results-grid .result-card .card-footer .btn-open {
  background: rgba(34,197,94,0.1);
  color: #34d399;
  margin-left: auto;
}

.results-grid .result-card .card-footer .btn-open:hover {
  background: rgba(34,197,94,0.2);
}

/* Status */
.stream-status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  margin-top: 20px;
  font-size: 13px;
  color: #6b7280;
}

.stream-status .spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: #22c55e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.stream-status .status-done {
  color: #34d399;
}

.stream-status .status-error {
  color: #f87171;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 16px;
  color: #6b7280;
}

.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.5;
}

.empty-state h4 {
  font-size: 16px;
  color: #9ca3af;
  margin-bottom: 4px;
}

.empty-state p {
  font-size: 13px;
}

/* Responsive */
@media (max-width: 768px) {
  .stream-hero h1 { font-size: 24px; }
  .results-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="main-content">

  <div class="stream-hero">
    <h1>▶️ YT Stream Generator</h1>
    <p>Generate direct video and audio stream URLs from YouTube links</p>
  </div>

  <div class="stream-panel">

    <!-- Input Card -->
    <div class="stream-card">
      <div class="card-header">
        <div class="card-icon green">🔗</div>
        <h3>YouTube URLs</h3>
        <span class="card-badge">● Free</span>
      </div>
      <textarea id="urls" rows="5" placeholder="Paste YouTube URLs here (one per line)&#10;Example:&#10;https://www.youtube.com/watch?v=dQw4w9WgXcQ&#10;https://youtu.be/9bZkp7q19f0"></textarea>
      <div class="action-row">
        <button class="btn-generate" onclick="generate()">⚡ Generate Streams</button>
        <button class="btn-clear" onclick="clearAll()">🗑 Clear</button>
      </div>
    </div>

    <!-- Status -->
    <div id="streamStatus" class="stream-status" style="display:none">
      <div class="spinner"></div>
      <span id="statusText">Processing...</span>
    </div>

    <!-- Results -->
    <div id="resultsArea">

      <div class="results-grid" id="emptyState">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🎬</div>
          <h4>No streams generated yet</h4>
          <p>Paste YouTube URLs above and click "Generate Streams"</p>
        </div>
      </div>

      <div class="results-grid" id="resultsGrid" style="display:none">

        <!-- Video Results -->
        <div class="result-card">
          <div class="card-top">
            <div class="type-icon video">🎬</div>
            <h4>Video Streams</h4>
            <span class="count" id="videoCount">0</span>
          </div>
          <div class="card-body">
            <textarea id="video_output" readonly placeholder="Video stream URLs will appear here..."></textarea>
          </div>
          <div class="card-footer">
            <button class="btn-copy-video" onclick="copyVideo()">📋 Copy All</button>
            <button class="btn-open" onclick="openFirstVideo()">▶ Open First</button>
          </div>
        </div>

        <!-- Audio Results -->
        <div class="result-card">
          <div class="card-top">
            <div class="type-icon audio">🎵</div>
            <h4>Audio Streams</h4>
            <span class="count" id="audioCount">0</span>
          </div>
          <div class="card-body">
            <textarea id="audio_output" readonly placeholder="Audio stream URLs will appear here..."></textarea>
          </div>
          <div class="card-footer">
            <button class="btn-copy-audio" onclick="copyAudio()">📋 Copy All</button>
            <button class="btn-open" onclick="openFirstAudio()">▶ Play First</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
async function generate() {
  const textarea = document.getElementById("urls");
  const rawUrls = textarea.value;
  const urls = rawUrls.split("\n").map(u => u.trim()).filter(u => u.length > 0);

  if (urls.length === 0) {
    alert("Please paste at least one YouTube URL");
    return;
  }

  // Show status
  const status = document.getElementById("streamStatus");
  const statusText = document.getElementById("statusText");
  status.style.display = "flex";
  statusText.textContent = `Processing ${urls.length} URL${urls.length > 1 ? "s" : ""}...`;

  // Hide results
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("resultsGrid").style.display = "none";

  const videoLinks = [];
  const audioLinks = [];

  for (let i = 0; i < urls.length; i++) {
    statusText.textContent = `Processing ${i + 1}/${urls.length}: ${urls[i].substring(0, 50)}...`;

    try {
      const res = await fetch("/ytplayer/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: urls[i] })
      });
      const data = await res.json();

      if (data.video) videoLinks.push(data.video);
      if (data.audio) audioLinks.push(data.audio);
    } catch (err) {
      videoLinks.push("// Error: " + urls[i]);
      audioLinks.push("// Error: " + urls[i]);
    }
  }

  // Show results
  document.getElementById("video_output").value = videoLinks.join("\n");
  document.getElementById("audio_output").value = audioLinks.join("\n");
  document.getElementById("videoCount").textContent = videoLinks.length;
  document.getElementById("audioCount").textContent = audioLinks.length;

  document.getElementById("resultsGrid").style.display = "grid";
  status.style.display = "none";
  statusText.textContent = "✅ Done!";
}

function copyVideo() {
  const text = document.getElementById("video_output");
  text.select();
  document.execCommand("copy");
  showToast("📋 Video URLs copied!");
}

function copyAudio() {
  const text = document.getElementById("audio_output");
  text.select();
  document.execCommand("copy");
  showToast("📋 Audio URLs copied!");
}

function openFirstVideo() {
  const text = document.getElementById("video_output").value;
  const first = text.split("\n").filter(l => l.startsWith("http"))[0];
  if (first) window.open(first, "_blank");
  else showToast("No valid video URL found");
}

function openFirstAudio() {
  const text = document.getElementById("audio_output").value;
  const first = text.split("\n").filter(l => l.startsWith("http"))[0];
  if (first) window.open(first, "_blank");
  else showToast("No valid audio URL found");
}

function clearAll() {
  document.getElementById("urls").value = "";
  document.getElementById("video_output").value = "";
  document.getElementById("audio_output").value = "";
  document.getElementById("resultsGrid").style.display = "none";
  document.getElementById("emptyState").style.display = "grid";
  document.getElementById("streamStatus").style.display = "none";
}

// Simple toast
function showToast(msg) {
  const existing = document.querySelector(".toast-msg");
  if (existing) existing.remove();
  const div = document.createElement("div");
  div.className = "toast-msg";
  div.textContent = msg;
  Object.assign(div.style, {
    position: "fixed", bottom: "24px", left: "50%", transform: "translateX(-50%)",
    background: "rgba(34,197,94,0.9)", color: "#fff", padding: "10px 24px",
    borderRadius: "10px", fontSize: "14px", fontWeight: "500",
    zIndex: "9999", boxShadow: "0 4px 20px rgba(0,0,0,0.3)",
    animation: "fadeInUp 0.3s ease-out"
  });
  document.body.appendChild(div);
  setTimeout(() => { div.style.opacity = "0"; div.style.transition = "opacity 0.3s"; }, 2000);
  setTimeout(() => div.remove(), 2500);
}
</script>

<script src="/shared.js"></script>
</body>
</html>

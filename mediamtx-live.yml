logLevel: info
logDestinations: [stdout]
readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1472

authMethod: internal

rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"

hls: true
hlsAddress: :8888
hlsEncryption: false
hlsAllowOrigins: ["*"]
hlsAlwaysRemux: true
hlsVariant: mpegts
hlsSegmentCount: 6
hlsSegmentDuration: 2s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsMuxerCloseAfter: 15s

api: false
metrics: false
pprof: false
playback: false

paths:
  live:
    source: publisher
    overridePublisher: true

  live/live:
    source: publisher
    overridePublisher: true

  offline:
    source: publisher
    overridePublisher: true

  all_others:
    source: publisher
    overridePublisher: true

logLevel: info
logDestinations: [stdout]
readTimeout: 30s
writeTimeout: 30s
writeQueueSize: 1024
udpMaxPayloadSize: 1472

authMethod: internal

rtmp: true
rtmpAddress: :1935
rtmpEncryption: "no"

hls: true
hlsAddress: :8888
hlsEncryption: false
hlsAllowOrigins: ["*"]
hlsAlwaysRemux: true
hlsVariant: fmp4
hlsSegmentCount: 10
hlsSegmentDuration: 4s
hlsPartDuration: 1s
hlsSegmentMaxSize: 50M
hlsMuxerCloseAfter: 30s

api: false
metrics: false
pprof: false
playback: false

paths:
  live:
    source: publisher
    overridePublisher: true

  live/live:
    source: publisher
    overridePublisher: true

  offline:
    source: publisher
    overridePublisher: true

  all_others:
    source: publisher
    overridePublisher: true
